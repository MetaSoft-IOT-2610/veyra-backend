environment.name=dev
## Spring Application Name
spring.datasource.url=jdbc:mysql://localhost:3306/veyra?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=12345678

## MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/veyra
spring.data.mongodb.database=veyra

# Tracking seeding (measurements require MongoDB)
tracking.seeding.devices.enabled=true
tracking.seeding.measurements.enabled=false

# External integrations (disable to run locally without SaaS credentials)
integrations.stripe.enabled=false
integrations.cloudinary.enabled=false
integrations.sendgrid.enabled=true
integrations.fcm.enabled=true

# Stripe Configuration Properties
stripe.api.key=${STRIPE_API_KEY:stripe_api_key_dev}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:stripe_webhook_secret_dev}

# Cloudinary Configuration Properties
cloudinary.cloud-name=CLOUDINARY_CLOUD_NAME
cloudinary.api-key=CLOUDINARY_API_KEY
cloudinary.api-secret=CLOUDINARY_API_SECRET

# Communication providers
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:no-reply@metasoft.pe}
sendgrid.from.name=${SENDGRID_FROM_NAME:Veyra & Metasoft Solutions}


firebase.project.id=${FIREBASE_PROJECT_ID:upc-pre-iot-metasoft}
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:secrets/firebase-service-account.json}
spring.jpa.show-sql=true


# JWT Configuration Properties
authorization.jwt.secret = WriteHereYourSecretStringForTokenSigningCredentials
authorization.jwt.expiration.days = 7

# WebSocket / STOMP
# Heartbeat: server sends a ping every 25s, expects client pong within 25s
spring.websocket.stomp.heartbeat.send=25000
spring.websocket.stomp.heartbeat.receive=25000
